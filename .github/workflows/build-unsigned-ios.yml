name: 构建未签名 iOS IPA

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:   # 允许手动触发

jobs:
  build-unsigned-ipa:
    runs-on: macos-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 下载 Godot (macOS 版)
        run: |
          wget -q https://github.com/godotengine/godot/releases/download/4.2.1-stable/Godot_v4.2.1-stable_macos.universal.zip
          unzip -q Godot_v4.2.1-stable_macos.universal.zip
          sudo mv Godot.app/Contents/MacOS/Godot /usr/local/bin/godot

      - name: 下载并安装 iOS 导出模板
        run: |
          wget -q https://github.com/godotengine/godot/releases/download/4.2.1-stable/Godot_v4.2.1-stable_export_templates.tpz
          mkdir -p ~/.local/share/godot/export_templates/4.2.1.stable
          unzip -q Godot_v4.2.1-stable_export_templates.tpz -d ~/.local/share/godot/export_templates/4.2.1.stable
          mv ~/.local/share/godot/export_templates/4.2.1.stable/templates/* ~/.local/share/godot/export_templates/4.2.1.stable/

      - name: 创建导出目录
        run: mkdir -p build/ios

      - name: 导出 Xcode 项目 (未签名)
        run: |
          # 使用 --export 选项但跳过签名，生成 Xcode 项目
          godot --headless --export "iOS" ./build/ios/YourGame.xcodeproj

      - name: 编译生成 .app (未签名)
        run: |
          cd build/ios
          # 使用 xcodebuild 编译，CODE_SIGN_IDENTITY 设为空跳过签名
          xcodebuild -project YourGame.xcodeproj -scheme YourGame -configuration Release CODE_SIGN_IDENTITY="" CODE_SIGNING_REQUIRED=NO

      - name: 打包为未签名 IPA
        run: |
          cd build/ios
          mkdir Payload
          cp -r build/Release-iphoneos/YourGame.app Payload/
          zip -r YourGame.ipa Payload

      - name: 上传 IPA 构件
        uses: actions/upload-artifact@v4
        with:
          name: unsigned-ios-ipa
          path: build/ios/YourGame.ipa