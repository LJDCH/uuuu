name: Build Unsigned iOS IPA (Godot 4)

# 触发条件：手动触发，或推送到 main 分支时触发
on:
  workflow_dispatch:
  push:
    branches:
      - main

# 环境变量配置
env:
  GODOT_VERSION: "4.2.1" # 在这里修改为你使用的 Godot 版本（建议与本地开发版本一致）
  EXPORT_PRESET_NAME: "iOS" # 对应你在 Godot 中 export_presets.cfg 配置的 iOS 导出预设名称
  PROJECT_PATH: "." # project.godot 所在的路径，如果在根目录就是 "."

jobs:
  build-ios:
    runs-on: macos-13 # 必须使用 macOS 才能运行 xcodebuild

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Download and Install Godot
        run: |
          echo "正在下载 Godot 引擎..."
          wget -q https://github.com/godotengine/godot/releases/download/${GODOT_VERSION}-stable/Godot_v${GODOT_VERSION}-stable_macos.universal.zip
          unzip -q Godot_v${GODOT_VERSION}-stable_macos.universal.zip
          # 将 Godot 移动到 bin 目录使其可全局调用
          sudo mv Godot.app/Contents/MacOS/Godot /usr/local/bin/godot
          sudo chmod +x /usr/local/bin/godot

      - name: Download and Install Godot Export Templates
        run: |
          echo "正在下载导出模板..."
          wget -q https://github.com/godotengine/godot/releases/download/${GODOT_VERSION}-stable/Godot_v${GODOT_VERSION}-stable_export_templates.tpz
          mkdir -p ~/Library/Application\ Support/Godot/export_templates/${GODOT_VERSION}.stable/
          unzip -q Godot_v${GODOT_VERSION}-stable_export_templates.tpz
          mv templates/* ~/Library/Application\ Support/Godot/export_templates/${GODOT_VERSION}.stable/

      # 添加缓存机制，防止每次都要重新导入海量资源导致超时或内存溢出
      - name: Cache Godot .godot folder
        uses: actions/cache@v4
        with:
          path: ${{ env.PROJECT_PATH }}/.godot
          key: ${{ runner.os }}-godot-project-${{ hashFiles('**/project.godot') }}
          restore-keys: |
            ${{ runner.os }}-godot-project-

      - name: Export Xcode Project via Godot
        run: |
          mkdir -p build/ios
          cd ${{ env.PROJECT_PATH }}

          echo "步骤 1：预导入项目资源 (防止 exit code 137)..."
          # 运行编辑器模式并立即退出，专门用于生成 .godot 导入缓存。|| true 防止非致命警告导致构建失败
          godot --headless --editor --quit || true

          echo "步骤 2：执行 Xcode 项目导出..."
          # 使用 --audio-driver Dummy 禁用音频驱动，防止 macOS 底层音频崩溃
          godot --headless --audio-driver Dummy --export-release "${{ env.EXPORT_PRESET_NAME }}" $GITHUB_WORKSPACE/build/ios/game.xcodeproj

      - name: Build Unsigned App using xcodebuild
        run: |
          cd build/ios
          echo "正在编译 Xcode 项目并绕过签名..."
          # 禁用代码签名并编译 Xcode 项目
          xcodebuild build \
            -project *.xcodeproj \
            -configuration Release \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            CONFIGURATION_BUILD_DIR=$(pwd)/build_output

      - name: Package to Unsigned IPA
        run: |
          cd build/ios
          echo "正在打包 IPA 文件..."
          # 标准的未签名 IPA 打包方式：创建 Payload 文件夹，放入 .app，然后压缩
          mkdir -p Payload
          cp -R build_output/*.app Payload/
          zip -q -r game_unsigned.ipa Payload

      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: godot-ios-unsigned-ipa
          path: build/ios/game_unsigned.ipa
          retention-days: 7 # 构建产物保留 7 天
