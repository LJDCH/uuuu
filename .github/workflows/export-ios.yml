name: Export Unsigned iOS IPA (Godot 4)

on:
  workflow_dispatch: # 允许手动触发工作流
  push:
    branches:
      - main # 当推送到 main 分支时触发

env:
  GODOT_VERSION: "4.2.1" # 在这里修改为你使用的 Godot 版本
  EXPORT_PRESET_NAME: "iOS" # 对应你在 export_presets.cfg 中命名的 iOS 导出预设名称
  PROJECT_PATH: "." # project.godot 所在的路径，如果是根目录就是 "."

jobs:
  export-ios:
    runs-on: macos-latest # 必须使用 macOS 才能运行 xcodebuild
    
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Download and Install Godot
        run: |
          wget https://github.com/godotengine/godot/releases/download/${GODOT_VERSION}-stable/Godot_v${GODOT_VERSION}-stable_macos.universal.zip
          unzip Godot_v${GODOT_VERSION}-stable_macos.universal.zip
          # 将 Godot 移动到 bin 目录使其可全局调用
          sudo mv Godot.app/Contents/MacOS/Godot /usr/local/bin/godot
          sudo chmod +x /usr/local/bin/godot

      - name: Download and Install Godot Export Templates
        run: |
          wget https://github.com/godotengine/godot/releases/download/${GODOT_VERSION}-stable/Godot_v${GODOT_VERSION}-stable_export_templates.tpz
          mkdir -p ~/Library/Application\ Support/Godot/export_templates/${GODOT_VERSION}.stable/
          unzip Godot_v${GODOT_VERSION}-stable_export_templates.tpz
          mv templates/* ~/Library/Application\ Support/Godot/export_templates/${GODOT_VERSION}.stable/

      - name: Export Xcode Project via Godot
        run: |
          mkdir -p build/ios
          cd ${{ env.PROJECT_PATH }}
          # 运行无头模式导出 Xcode 项目
          godot --headless --export-release "${{ env.EXPORT_PRESET_NAME }}" $GITHUB_WORKSPACE/build/ios/game.xcodeproj

      - name: Build Unsigned App using xcodebuild
        run: |
          cd build/ios
          # 禁用代码签名并编译 Xcode 项目
          xcodebuild build \
            -project *.xcodeproj \
            -configuration Release \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            CONFIGURATION_BUILD_DIR=$(pwd)/build_output
            
      - name: Package to Unsigned IPA
        run: |
          cd build/ios
          # 标准的未签名 IPA 打包方式：创建 Payload 文件夹，放入 .app，然后压缩
          mkdir -p Payload
          cp -R build_output/*.app Payload/
          zip -r game_unsigned.ipa Payload

      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: godot-ios-unsigned-ipa
          path: build/ios/game_unsigned.ipa
          retention-days: 7
